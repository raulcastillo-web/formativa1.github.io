<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>GEOM-OS Terminal</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.terminal{
border:2px solid #00ff00;
padding:40px;
width:500px;
}

input{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:10px;
width:100%;
margin-top:10px;
}

button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:10px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#003300;
}

.progress{
width:100%;
background:#001100;
margin-top:20px;
}

.progress-bar{
height:20px;
width:0%;
background:#00ff00;
}

.fail{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="terminal">

<h2>GEOM-OS TERMINAL 01</h2>

<p id="intro"></p>

<input id="answer" placeholder="(x,y) (x,y) (x,y)">

<button onclick="checkAnswer()">EXECUTE COMMAND</button>

<button onclick="goBack()">RETURN TO MAINFRAME</button>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<p id="response"></p>

</div>

<script>

const introText =
"> ACCESSING TERMINAL...\n> SYSTEM LOCKED\n> ENTER FINAL COORDINATES";

let i = 0;

function typeIntro(){

if(i < introText.length){
document.getElementById("intro").innerHTML += introText.charAt(i);
i++;
setTimeout(typeIntro,30);
}

}

typeIntro();


function checkAnswer(){

let answer = document.getElementById("answer").value;
let response = document.getElementById("response");
let bar = document.getElementById("bar");

response.innerHTML="> INTENTANDO HACKEAR EL SISTEMA...";
bar.style.width="0%";

let progress = 0;

let loading = setInterval(function(){

progress += 20;
bar.style.width = progress + "%";

if(progress >= 100){

clearInterval(loading);

let correct="(4,0) (7,0) (5,3)";

if(answer === correct){

response.innerHTML =
"> ACCESS GRANTED<br>PASSWORD WORD: GEOMETRY";

}
else{

response.innerHTML =
"<span class='fail'>HACKEO FALLIDO</span>";

}

}

},600);

}
function goBack() {
    // Ejemplo: redirigir a una pantalla de inicio ficticia
    window.location.href = "index.html"; 
}
</script>


</body>
</html>
